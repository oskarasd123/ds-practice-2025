syntax = "proto3";
package database;

service DatabaseService {
    rpc Read (ReadRequest) returns (ReadResponse);
    rpc Write (WriteRequest) returns (WriteResponse);
}

message ReadRequest {
    string key = 1;
}

message ReadResponse {
    string key = 1;
    int32 stock = 2;
}

message WriteRequest {
    string key = 1;
    int32 stock = 2;
}

message WriteResponse{
    bool success = 1;
}