syntax = "proto3";
package executor;

service ExecutorService {
    rpc Election (ElectionRequest) returns (ElectionResponse);
    rpc Coordinator (CoordinatorRequest) returns (CoordinatorResponse);
    rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
    rpc Write (WriteRequest) returns (WriteResponse);
    rpc Read (ReadRequest) returns (ReadResponse);
}

message ElectionRequest { int32 sender_id = 1; }
message ElectionResponse { bool ok = 1; }

message CoordinatorRequest { int32 leader_id = 1; }
message CoordinatorResponse { bool ok = 1; }

message HeartbeatRequest { int32 leader_id = 1; }
message HeartbeatResponse { bool is_alive = 1; }

message WriteRequest {
    string key = 1;
    int32 value = 2;
}
message WriteResponse {
    bool success = 1;
}

message ReadRequest {
    string key = 1;
}
message ReadResponse {
    int32 value = 1;
}