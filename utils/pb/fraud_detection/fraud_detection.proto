syntax = "proto3";
package fraud_detection;
import "google/protobuf/empty.proto";

service FraudDetectionService {
    rpc initOrder  (InitRequest)  returns (google.protobuf.Empty);
    rpc userCheck  (EventRequest) returns (google.protobuf.Empty);  // event (d)
    rpc cardCheck  (EventRequest) returns (google.protobuf.Empty);  // event (e)
    rpc clearOrder (ClearRequest) returns (google.protobuf.Empty);  // bonus
}

message VectorClock {
    repeated int64 values = 1;
}

message OrderData {
    string card_nr       = 1;
    float  order_amount  = 2;
}

message InitRequest  { int64 order_id = 1; OrderData data = 2; }
message EventRequest { int64 order_id = 1; VectorClock clock = 2; }
message ClearRequest { int64 order_id = 1; VectorClock final_clock = 2; }