syntax = "proto3";
package orchestrator;
import "google/protobuf/empty.proto";

service OrchestratorService {
    rpc eventDone       (EventDoneRequest)      returns (google.protobuf.Empty);
    rpc suggestionsDone (suggestionsDoneRequest) returns (google.protobuf.Empty);
}

message VectorClock {
    repeated int64 values = 1;
}

message EventDoneRequest {
    int64       order_id   = 1;
    string      event_name = 2;  // "a", "b", "c", "d", "e"
    VectorClock clock      = 3;
    bool        failed     = 4;
    string      error_msg  = 5;
    bool        is_fraud   = 6;  // only populated by event (e)
}

message suggestionsDoneRequest {
    int64           order_id    = 1;
    repeated string suggestions = 2;
    VectorClock     clock       = 3;
}