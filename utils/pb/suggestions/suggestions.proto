syntax = "proto3";
package suggestions;
import "google/protobuf/empty.proto";

service SuggestionsService {
    rpc initOrder      (InitRequest)          returns (google.protobuf.Empty);
    rpc getSuggestions (getSuggestionsRequest) returns (google.protobuf.Empty);
    rpc clearOrder     (ClearRequest)         returns (google.protobuf.Empty);
}

message VectorClock {
    repeated int64 values = 1;
}

message InitRequest { int64 order_id = 1; }

message getSuggestionsRequest {
    int64       order_id = 1;
    VectorClock clock    = 2;
}

message ClearRequest {
    int64       order_id    = 1;
    VectorClock final_clock = 2;
}