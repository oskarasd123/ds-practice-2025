services:
  frontend:
    build:
      context: ./
      dockerfile: ./frontend/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./frontend/src:/usr/share/nginx/html

  orchestrator:
    build:
      context: ./
      dockerfile: ./orchestrator/Dockerfile
    ports:
      - "8081:5000"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - DEBUG_FLAG=True
      - FRAUD_DETECTION_PORT=50051
      - TRANSACTION_PORT=50052
      - SUGGESTIONS_PORT=50053
      # The PYTHONFILE environment variable specifies the absolute entry point of the application
      # Check app.py in the orchestrator directory to see how this is used
      - PYTHONFILE=/app/orchestrator/src/app.py
    volumes:
      - ./utils:/app/utils
      - ./orchestrator/src:/app/orchestrator/src
      - ./logs:/logs

  fraud_detection:
    build:
      context: ./
      dockerfile: ./fraud_detection/Dockerfile
    ports:
      - "50051:50051"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - FRAUD_DETECTION_PORT=50051
      # The PYTHONFILE environment variable specifies the absolute entry point of the application
      # Check app.py in the fraud_detection directory to see how this is used
      - PYTHONFILE=/app/fraud_detection/src/app.py
    volumes:
      - ./utils:/app/utils
      - ./fraud_detection/src:/app/fraud_detection/src
      - ./logs:/logs

  transaction_verification:
    build:
      context: ./
      dockerfile: ./transaction_verification/Dockerfile
    ports:
      - "50052:50052"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - TRANSACTION_PORT=50052
      # The PYTHONFILE environment variable specifies the absolute entry point of the application
      # Check app.py in the fraud_detection directory to see how this is used
      - PYTHONFILE=/app/transaction_verification/src/app.py
    volumes:
      - ./utils:/app/utils
      - ./transaction_verification/src:/app/transaction_verification/src
      - ./logs:/logs

  suggestions:
    build:
      context: ./
      dockerfile: ./suggestions/Dockerfile
    ports:
      - "50053:50053"
    env_file:
      - suggestions/.env
    volumes:
      - ./utils:/app/utils
      - ./suggestions/src:/app/suggestions/src
      - ./logs:/logs

  order_queue:
    build:
      context: ./
      dockerfile: ./order_queue/Dockerfile
    ports:
      - "50054:50054"
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/order_queue/src/app.py
    volumes:
      - ./utils:/app/utils
      - ./order_queue/src:/app/order_queue/src
      - ./logs:/logs

  executor_1:
    build:
      context: ./
      dockerfile: ./executor/Dockerfile
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/executor/src/app.py
      - EXECUTOR_ID=1
      - KNOWN_IDS=2,3
      - QUEUE_HOST=order_queue:50054
    volumes:
      - ./utils:/app/utils
      - ./executor/src:/app/executor/src
      - ./logs:/logs
    depends_on:
      - order_queue

  executor_2:
    build:
      context: ./
      dockerfile: ./executor/Dockerfile
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/executor/src/app.py
      - EXECUTOR_ID=2
      - KNOWN_IDS=1,3
      - QUEUE_HOST=order_queue:50054
    volumes:
      - ./utils:/app/utils
      - ./executor/src:/app/executor/src
      - ./logs:/logs
    depends_on:
      - order_queue

  executor_3:
    build:
      context: ./
      dockerfile: ./executor/Dockerfile
    environment:
      - PYTHONUNBUFFERED=TRUE
      - PYTHONFILE=/app/executor/src/app.py
      - EXECUTOR_ID=3
      - KNOWN_IDS=1,2
      - QUEUE_HOST=order_queue:50054
    volumes:
      - ./utils:/app/utils
      - ./executor/src:/app/executor/src
      - ./logs:/logs
    depends_on:
      - order_queue